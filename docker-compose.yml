version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: sybil-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/wallets:/app/wallets
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
    container_name: sybil-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    environment:
      - NODE_ENV=development
    depends_on:
      - backend